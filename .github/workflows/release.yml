name: Build and Release KPackage

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Create KPackage archive
        run: |
          # Extract version from tag (e.g. 1.2.3 from v1.2.3)
          VERSION=${GITHUB_REF#refs/tags/v}
          
          # Dynamically update Version field in metadata.json
          jq ".KPlugin.Version = \"${VERSION}\"" metadata.json > temp.json && mv temp.json metadata.json
          
          # Create a compressed tarball containing the updated files
          tar -cJf matrix-screensaver.tar.xz metadata.json contents/
          
          # Alternatively, Plasma also supports ZIP files seamlessly
          zip -r matrix-screensaver.zip metadata.json contents/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            matrix-screensaver.tar.xz
            matrix-screensaver.zip
          generate_release_notes: true


