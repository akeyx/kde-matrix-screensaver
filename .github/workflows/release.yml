name: Build and Release KPackage

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Create KPackage archive
        run: |
          # Create a compressed tarball containing just the files Plasma needs
          tar -cJf matrix-screensaver.tar.xz metadata.json contents/
          
          # Alternatively, Plasma also supports ZIP files seamlessly
          zip -r matrix-screensaver.zip metadata.json contents/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            matrix-screensaver.tar.xz
            matrix-screensaver.zip
          generate_release_notes: true

      - name: Upload to KDE Store (Pling)
        env:
          PLING_USER: ${{ secrets.PLING_USERNAME }}
          PLING_PASS: ${{ secrets.PLING_PASSWORD }}
          PRODUCT_ID: "2365782"
          FILE_PATH: "matrix-screensaver.tar.xz"
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          AUTH_HEADER=$(echo -n "${PLING_USER}:${PLING_PASS}" | base64)
          curl -f -L --post301 -X POST \
            -H "Authorization: Basic ${AUTH_HEADER}" \
            -H "OCS-APIRequest: true" \
            -F "file=@${FILE_PATH}" \
            -F "version=${VERSION}" \
            -F "name=matrix-screensaver-${VERSION}.tar.xz" \
            "https://www.opendesktop.org/ocs/v1/content/data/${PRODUCT_ID}"
