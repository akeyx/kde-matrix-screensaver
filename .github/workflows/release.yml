name: Build and Release KPackage

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Create KPackage archive
        run: |
          # Create a compressed tarball containing just the files Plasma needs
          tar -cJf matrix-screensaver.tar.xz metadata.json contents/
          
          # Alternatively, Plasma also supports ZIP files seamlessly
          zip -r matrix-screensaver.zip metadata.json contents/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            matrix-screensaver.tar.xz
            matrix-screensaver.zip
          generate_release_notes: true

      - name: Install pling-publisher
        run: |
          pip install pling-publisher

      - name: Upload to KDE Store (Pling)
        env:
          PLING_USERNAME: ${{ secrets.PLING_USERNAME }}
          PLING_PASSWORD: ${{ secrets.PLING_PASSWORD }}
        run: |
          pling publisharchive \
            --file matrix-screensaver.tar.xz \
            --username "${PLING_USERNAME}" \
            --password "${PLING_PASSWORD}" \
            --project-id "2365782"
